<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>麦当劳人格测试</title>
<style>
:root{--red:#db0007;--yellow:#ffc72c;--dark:#292929}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:linear-gradient(180deg,#fff8df,#fff,#fff0b8);color:var(--dark)}
.wrap{max-width:720px;margin:auto;padding:22px 18px 42px}
.hero,.card,.result-card{background:rgba(255,255,255,.94);border-radius:28px;box-shadow:0 18px 50px rgba(0,0,0,.14);border:1px solid rgba(219,0,7,.08)}
.hero{min-height:calc(100vh - 44px);padding:28px 22px;display:flex;flex-direction:column;justify-content:space-between}
.tag{display:inline-block;background:#fff0be;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:800;color:#7a4a00}
h1{font-size:39px;line-height:1.05;margin:24px 0 14px}
.brand{
  display:block;
  font-size:1.8em;
  color:var(--red);
  font-weight:950;
  text-shadow:0 5px 0 rgba(255,199,44,.55);
}
.note{display:inline-block;margin-top:10px;font-size:14px;font-weight:500;color:#777;background:#f5f5f5;border-radius:999px;padding:5px 10px}
.sub{font-size:16px;line-height:1.7;color:#4c4c4c}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:22px 0}
.stat{background:#fff8e3;border:1px solid rgba(255,199,44,.45);border-radius:18px;padding:12px 8px;text-align:center}
.stat b{display:block;font-size:21px;color:var(--red)}
.stat span{font-size:12px;color:#666}
.stat button{background:none;color:inherit;border:0;box-shadow:none;padding:0;margin:0;width:100%;font:inherit;min-height:auto;cursor:pointer}
button{width:100%;min-height:56px;border:0;border-radius:18px;background:linear-gradient(135deg,var(--red),#a40000);color:white;font-size:17px;font-weight:850;box-shadow:0 12px 24px rgba(219,0,7,.24);cursor:pointer}
button.secondary{background:#fff;color:var(--red);border:1.5px solid rgba(219,0,7,.22);box-shadow:none}
button:disabled{cursor:not-allowed}
.small{font-size:12px;color:#888;text-align:center;line-height:1.6}
.quiz,.result{display:none}
.topbar{position:sticky;top:0;z-index:5;padding:12px 0;background:rgba(255,248,223,.72);backdrop-filter:blur(10px)}
.progress{height:12px;background:#ffe4e5;border-radius:999px;overflow:hidden}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--yellow),var(--red));transition:.2s}
.counter{text-align:center;font-size:13px;color:#777;font-weight:800;margin-top:8px}
.card{padding:22px 18px;margin-top:12px}
.qemoji{font-size:42px}
.question{font-size:24px;font-weight:900;line-height:1.3;margin:10px 0 18px}
.options{display:grid;gap:12px}
.option{background:white;color:#222;box-shadow:none;border:1.5px solid #eee;text-align:left;padding:16px;border-radius:20px;font-size:16px;line-height:1.45;font-weight:760}
.option.selected{border-color:var(--red);background:#fff0f0;color:var(--red)}
.nav-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
.result-card{text-align:center;padding:24px 18px;margin-top:12px}
.food-img-wrap{width:100%;max-width:330px;height:230px;margin:14px auto;border-radius:28px;background:linear-gradient(180deg,#fff7d6,#fff);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,199,44,.45)}
.food-img{max-width:92%;max-height:92%;object-fit:contain;filter:drop-shadow(0 16px 18px rgba(0,0,0,.16))}
.match{display:inline-block;background:var(--red);color:#fff;border-radius:999px;padding:7px 13px;font-size:13px;font-weight:850}
.result h2{font-size:32px;color:var(--red);margin:14px 0 6px}
.type{color:#777;font-weight:800;margin-bottom:16px}
.desc{text-align:left;background:#fff9e9;border:1px solid rgba(255,199,44,.35);border-radius:22px;padding:16px;font-size:16px;line-height:1.75;color:#3f3f3f}
.grid{display:grid;gap:12px;margin:16px 0}
.mini{text-align:left;background:#fafafa;border:1px solid #eee;border-radius:20px;padding:14px;line-height:1.55}
.mini b{display:block;margin-bottom:5px}
.actions{display:grid;gap:10px;margin-top:18px}
.donate-area{margin-top:14px;padding:14px;border-radius:22px;background:#fffaf0;border:1px solid rgba(255,199,44,.42)}
.donate-area p{font-size:13px;color:#666;line-height:1.6;margin:0 0 10px}
.creator{text-align:center;font-size:10px;color:rgba(41,41,41,.45);margin-top:34px;line-height:1.6}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.62);z-index:99;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal.show{display:flex}
.modal-card{background:white;border-radius:28px;padding:20px;max-width:390px;width:100%;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.35)}
.result-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;text-align:left;max-height:60vh;overflow:auto}
.result-item{display:flex;align-items:center;gap:9px;background:#fff8e3;border:1px solid rgba(255,199,44,.42);border-radius:16px;padding:10px;font-size:13px;font-weight:800}
.result-item img{width:42px;height:42px;object-fit:contain}
.result-item small{display:block;color:#777;font-weight:600;margin-top:2px}
.payqr{width:100%;border-radius:20px;border:1px solid #eee}
.close-btn{margin-top:12px;background:#f4f4f4;color:#333;box-shadow:none}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(30px);background:#222;color:#fff;border-radius:999px;padding:10px 16px;font-size:14px;opacity:0;transition:.25s;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:640px){.grid{grid-template-columns:1fr 1fr}h1{font-size:52px}}
</style>
</head>

<body>
<div class="wrap">

<section class="hero" id="home">
  <div>
    <div class="tag">🍔 娱乐测试 · 麦门人格识别器</div>
    <h1>
测一测你的
<span class="brand">McBTI</span>
<span class="note">麦当劳中国大陆版</span>
</h1>
    <p class="sub">回答 20 道类似 MBTI 的问题，看看你更像哪一款麦当劳食物。</p>
    <div class="stats">
      <div class="stat"><b>20</b><span>道问题</span></div>
      <div class="stat"><button onclick="openResultsList()"><b>16</b><span>种结果<br>点我查看</span></button></div>
      <div class="stat"><b>2min</b><span>完成</span></div>
    </div>
  </div>
  <div>
    <button onclick="startQuiz()">开始测试</button>
    <p class="small">仅供娱乐，不代表麦当劳官方意见，也不是严肃心理测评。</p>
  </div>
</section>

<section class="quiz" id="quiz">
  <div class="topbar">
    <div class="progress"><div class="bar" id="bar"></div></div>
    <div class="counter" id="counter"></div>
  </div>
  <div class="card">
    <div class="qemoji" id="qemoji"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="nav-buttons">
      <button class="secondary" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
      <button class="secondary" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>
</section>

<section class="result" id="result">
  <div class="result-card">
    <div class="match" id="match"></div>
    <div class="food-img-wrap"><img class="food-img" id="foodImg" alt="结果食品图片"></div>
    <h2 id="foodName"></h2>
    <div class="type" id="foodType"></div>
    <div class="desc" id="foodDesc"></div>
    <div class="grid">
      <div class="mini"><b>社交风格</b><span id="social"></span></div>
      <div class="mini"><b>恋爱风格</b><span id="love"></span></div>
      <div class="mini"><b>学习/工作风格</b><span id="work"></span></div>
      <div class="mini"><b>隐藏标签</b><span id="tagline"></span></div>
    </div>
    <div class="actions">
      <button onclick="copyLink()">复制网页链接</button>
      <button class="secondary" onclick="restart()">重新测试</button>
      <div class="donate-area">
        <p>如果这个测试让你开心了一分钟，欢迎请作者吃根薯条 🍟</p>
        <button onclick="openDonate()">🍟 请作者吃根薯条</button>
      </div>
    </div>
  </div>
  <div class="creator">Creator: Denny Chen<br>Douyin: cjj6876</div>
</section>

</div>

<div class="modal" id="resultsModal" onclick="closeResultsList()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <h3>16种可能结果</h3>
    <p>完整麦门人格池如下：</p>
    <div class="result-list" id="resultList"></div>
    <button class="close-btn" onclick="closeResultsList()">关闭</button>
  </div>
</div>

let current = 0;
let answers = new Array(questions.length).fill(null);

function startQuiz(){
  document.getElementById("home").style.display="none";
  document.getElementById("quiz").style.display="block";
  document.getElementById("result").style.display="none";
  current = 0;
  renderQ();
  window.scrollTo(0,0);
}

function renderQ(){
  const q = questions[current];
  document.getElementById("qemoji").textContent = q[0];
  document.getElementById("question").textContent = q[1];
  document.getElementById("counter").textContent = `${current+1} / ${questions.length}`;
  document.getElementById("bar").style.width = `${current/questions.length*100}%`;

  const box = document.getElementById("options");
  box.innerHTML = "";
  q[2].forEach(op => {
    const btn = document.createElement("button");
    btn.className = "option" + (answers[current] === op[1] ? " selected" : "");
    btn.textContent = op[0];
    btn.onclick = () => choose(op[1]);
    box.appendChild(btn);
  });

  document.getElementById("prevBtn").style.visibility = current === 0 ? "hidden" : "visible";
  document.getElementById("nextBtn").textContent = current === questions.length - 1 ? "查看结果 →" : "下一题 →";
  document.getElementById("nextBtn").disabled = answers[current] === null;
  document.getElementById("nextBtn").style.opacity = answers[current] === null ? ".45" : "1";
}

function choose(key){
  answers[current] = key;
  if(current >= questions.length - 1){
    showResult();
  } else {
    current++;
    renderQ();
    window.scrollTo({top:0,behavior:"smooth"});
  }
}

function prevQuestion(){
  if(current <= 0) return;
  current--;
  renderQ();
  window.scrollTo({top:0,behavior:"smooth"});
}

function nextQuestion(){
  if(answers[current] === null){
    toast("请先选择一个答案");
    return;
  }
  if(current >= questions.length - 1){
    showResult();
  } else {
    current++;
    renderQ();
    window.scrollTo({top:0,behavior:"smooth"});
  }
}

function calculateScores(){
  const scores = {};
  Object.keys(foods).forEach(k => scores[k] = 0);
  answers.forEach(k => {
    if(k && scores[k] !== undefined) scores[k] += 1;
  });
  return scores;
}

function showResult(){
  if(answers.some(a => a === null)){
    toast("还有题目没有完成");
    return;
  }

  const scores = calculateScores();
  const sorted = Object.keys(scores).sort((a,b)=>scores[b]-scores[a]);
  const topScore = scores[sorted[0]];
  const candidates = sorted.filter(k => scores[k] >= topScore - 1);
  const best = candidates[Math.floor(Math.random() * candidates.length)];
  const pct = Math.floor(Math.random() * 16) + 80;
  const f = foods[best];

  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";
  document.getElementById("match").textContent=`匹配度 ${pct}%`;
  document.getElementById("foodImg").src=f.img;
  document.getElementById("foodName").textContent=f.name;
  document.getElementById("foodType").textContent=f.type;
  document.getElementById("foodDesc").textContent=f.desc;
  document.getElementById("social").textContent=f.social;
  document.getElementById("love").textContent=f.love;
  document.getElementById("work").textContent=f.work;
  document.getElementById("tagline").textContent=f.tagline;
  window.scrollTo(0,0);
}

function restart(){
  current = 0;
  answers = new Array(questions.length).fill(null);
  document.getElementById("result").style.display="none";
  document.getElementById("home").style.display="flex";
  window.scrollTo(0,0);
}

function openResultsList(){
  const box = document.getElementById("resultList");
  box.innerHTML = Object.keys(foods).map(k => {
    const f = foods[k];
    return `<div class="result-item"><img src="${f.img}"><span>${f.name}<small>${f.type}</small></span></div>`;
  }).join("");
  document.getElementById("resultsModal").classList.add("show");
}

function closeResultsList(){
  document.getElementById("resultsModal").classList.remove("show");
}

function toast(t){
  const el=document.getElementById("toast");
  el.textContent=t;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1800);
