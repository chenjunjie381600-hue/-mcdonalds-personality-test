function renderQ(){
const q=questions[current];
document.getElementById("qemoji").textContent=q[0];
document.getElementById("question").textContent=q[1];
document.getElementById("counter").textContent=`${current+1} / ${questions.length}`;
document.getElementById("bar").style.width=`${current/questions.length*100}%`;
const box=document.getElementById("options");
box.innerHTML="";
q[2].forEach(op=>{
const btn=document.createElement("button");
btn.className="option";
btn.textContent=op[0];
btn.onclick=()=>choose(op[1]);
box.appendChild(btn);
});
}

function choose(key){
scores[key]+=1;
current++;
if(current>=questions.length){showResult();}
else{renderQ();window.scrollTo({top:0,behavior:"smooth"});}
}

function showResult(){
let best=Object.keys(scores).sort((a,b)=>scores[b]-scores[a] || Math.random()-0.5)[0];
let total=Object.values(scores).reduce((a,b)=>a+b,0);
let pct=Math.min(99,Math.max(76,Math.round(76+(scores[best]/total)*60)));
const f=foods[best];
document.getElementById("quiz").style.display="none";
document.getElementById("result").style.display="block";
document.getElementById("match").textContent=`匹配度 ${pct}%`;
document.getElementById("foodImg").src=f.img;
document.getElementById("foodName").textContent=f.name;
document.getElementById("foodType").textContent=f.type;
document.getElementById("foodDesc").textContent=f.desc;
document.getElementById("social").textContent=f.social;
document.getElementById("love").textContent=f.love;
document.getElementById("work").textContent=f.work;
document.getElementById("tagline").textContent=f.tagline;
window.scrollTo(0,0);
}

function restart(){
current=0;
Object.keys(scores).forEach(k=>scores[k]=0);
document.getElementById("result").style.display="none";
document.getElementById("home").style.display="flex";
window.scrollTo(0,0);
}

function openResultsList(){
const box=document.getElementById("resultList");
box.innerHTML=Object.keys(foods).map(k=>{
const f=foods[k];
return `<div class="result-item"><img src="${f.img}"><span>${f.name}<small>${f.type}</small></span></div>`;
}).join("");
document.getElementById("resultsModal").classList.add("show");
}
function closeResultsList(){document.getElementById("resultsModal").classList.remove("show");}
function openDonate(){document.getElementById("donateModal").classList.add("show");}
function closeDonate(){document.getElementById("donateModal").classList.remove("show");}
function copyLink(){
navigator.clipboard.writeText(location.href).then(()=>toast("已复制链接")).catch(()=>toast("请手动复制浏览器地址"));
}
function toast(t){
const el=document.getElementById("toast");
el.textContent=t;
el.classList.add("show");
setTimeout(()=>el.classList.remove("show"),1800);
}
</script>
</body>
