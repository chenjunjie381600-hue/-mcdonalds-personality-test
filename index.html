<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>你是麦当劳中国大陆菜单里的哪款食物？</title>
  <style>
    :root {
      --red: #db0007;
      --yellow: #ffc72c;
      --dark: #292929;
      --light: #fff8e7;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #fff1b8 0%, #fff8e7 35%, #f7f7f7 100%);
      color: var(--dark);
      min-height: 100vh;
    }
    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 18px 56px;
    }
    .hero {
      background: linear-gradient(135deg, var(--red), #a50005);
      color: white;
      border-radius: 28px;
      padding: 34px 28px;
      box-shadow: 0 18px 45px rgba(219,0,7,.22);
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: "M";
      position: absolute;
      right: 24px;
      bottom: -38px;
      color: rgba(255,199,44,.24);
      font-weight: 900;
      font-size: 170px;
      line-height: 1;
    }
    h1 { margin: 0 0 10px; font-size: clamp(30px, 5vw, 52px); letter-spacing: -1.2px; }
    .subtitle { max-width: 610px; line-height: 1.7; opacity: .94; font-size: 16px; margin: 0; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--yellow);
      color: #3b2500;
      font-weight: 800;
      padding: 8px 13px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .panel {
      margin-top: 22px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 14px 38px rgba(0,0,0,.09);
      padding: 24px;
    }
    .progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; }
    .progress {
      height: 12px;
      flex: 1;
      border-radius: 999px;
      background: #eee;
      overflow: hidden;
    }
    .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--yellow), var(--red)); transition: width .25s ease; }
    .q-count { font-weight: 800; color: #666; white-space: nowrap; }
    .question { font-size: clamp(22px, 3.5vw, 32px); font-weight: 900; line-height: 1.25; margin: 0 0 18px; }
    .options { display: grid; gap: 12px; }
    button.option {
      width: 100%;
      border: 2px solid #eeeeee;
      background: #fff;
      border-radius: 18px;
      padding: 16px 18px;
      text-align: left;
      cursor: pointer;
      font-size: 16px;
      line-height: 1.45;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
    }
    button.option:hover { transform: translateY(-2px); border-color: var(--yellow); background: #fffdf4; }
    .result { display: none; text-align: center; }
    .food-emoji { font-size: 78px; margin: 4px 0 6px; }
    .result h2 { margin: 8px 0 8px; font-size: clamp(30px, 4vw, 46px); }
    .result .type { color: var(--red); font-weight: 900; }
    .desc { max-width: 650px; margin: 14px auto 0; line-height: 1.85; font-size: 17px; }
    .traits {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin: 24px 0 12px;
    }
    .trait {
      background: #fff7df;
      border: 1px solid #ffe09a;
      border-radius: 16px;
      padding: 13px;
      font-weight: 800;
    }
    .actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 22px; }
    .primary, .secondary {
      border: none;
      border-radius: 999px;
      padding: 13px 19px;
      font-weight: 900;
      cursor: pointer;
      font-size: 15px;
    }
    .primary { background: var(--red); color: white; }
    .secondary { background: var(--yellow); color: #392400; }
    .footer-note { margin-top: 18px; color: #777; font-size: 13px; text-align: center; }
    .hidden { display: none; }
    .creator-credit { text-align:center; font-size:10px; opacity:.5; margin-top:38px; letter-spacing:.2px; }


    /* Mobile-first polish */
    html { -webkit-text-size-adjust: 100%; }
    button, input, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

    @media (max-width: 640px) {
      body {
        background: linear-gradient(180deg, #fff0b3 0%, #fff8e7 42%, #f7f7f7 100%);
      }
      .container {
        width: 100%;
        padding: max(14px, env(safe-area-inset-top)) 12px max(28px, env(safe-area-inset-bottom));
      }
      .hero {
        border-radius: 22px;
        padding: 24px 18px 26px;
        box-shadow: 0 12px 30px rgba(219,0,7,.18);
      }
      .hero::after {
        right: 8px;
        bottom: -28px;
        font-size: 118px;
      }
      .badge {
        font-size: 13px;
        padding: 7px 11px;
        margin-bottom: 14px;
      }
      h1 {
        line-height: .98;
        margin-bottom: 14px;
      }
      .subtitle {
        font-size: 14.5px;
        line-height: 1.65;
      }
      .panel {
        margin-top: 14px;
        border-radius: 22px;
        padding: 18px 14px;
      }
      .progress-wrap {
        gap: 8px;
        margin-bottom: 18px;
      }
      .progress { height: 10px; }
      .q-count { font-size: 13px; }
      .question {
        font-size: 23px;
        line-height: 1.28;
        margin-bottom: 16px;
      }
      .options { gap: 10px; }
      button.option {
        min-height: 58px;
        border-radius: 16px;
        padding: 15px 15px;
        font-size: 16px;
      }
      button.option:active {
        transform: scale(.99);
        border-color: var(--yellow);
        background: #fff8dc;
      }
      button.option:hover { transform: none; }
      .food-emoji { font-size: 66px; }
      .result h2 { font-size: 30px; line-height: 1.2; }
      .desc { font-size: 15.5px; line-height: 1.75; }
      .traits {
        grid-template-columns: 1fr 1fr;
        gap: 9px;
        margin-top: 20px;
      }
      .trait {
        border-radius: 14px;
        padding: 11px 8px;
        font-size: 13.5px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: 20px;
      }
      .primary, .secondary {
        width: 100%;
        min-height: 48px;
        font-size: 15.5px;
      }
      .footer-note { font-size: 12px; line-height: 1.5; }
      .creator-credit {
        text-align: center;
        font-size: 9px;
        opacity: .45;
        margin-top: 34px;
        letter-spacing: .2px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="badge">🍟 麦门人格测试</div>
      <h1><span style="font-size:1.6em;font-weight:900;">麦当劳</span> <span style="font-size:0.45em;font-weight:400;opacity:0.75;">中国大陆</span></h1>
      <p class="subtitle">回答 10 个轻松的问题，系统会根据你的社交方式、决策风格、情绪能量和生活口味，匹配一款最像你的麦当劳食物。仅供娱乐，但可能会有点准。</p>
    </section>

    <section class="panel" id="quizPanel">
      <div class="progress-wrap">
        <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        <div class="q-count" id="qCount">1 / 10</div>
      </div>
      <h2 class="question" id="questionText"></h2>
      <div class="options" id="options"></div>
    </section>

    <section class="panel result" id="resultPanel">
      <div class="food-emoji" id="foodEmoji"></div>
      <h2>你是：<span class="type" id="foodName"></span></h2>
      <p class="desc" id="foodDesc"></p>
      <div class="traits" id="traits"></div>
      <div class="actions">
        <button class="primary" onclick="restartQuiz()">重新测试</button>
        <button class="secondary" onclick="shareResult()">复制我的结果</button>
        <button class="secondary" onclick="copyPageLink()">复制网页链接</button>
      </div>
      <p class="footer-note">注：本测试为粉丝向娱乐项目，并非麦当劳官方测试。</p>
      <div class="creator-credit">Creator: Denny Chen</div>
    </section>
  </main>

  <script>
    const foods = {
      bigmac: {
        name: "巨无霸",
        emoji: "🍔",
        desc: "你是经典中的核心人物。你不一定最张扬，但一出现就有存在感。你重视结构、原则和体面，喜欢把事情安排得有层次；别人遇到复杂问题时，也常常会来找你拿主意。",
        traits: ["经典可靠", "领导感", "有层次", "稳中带强"]
      },
      spicyChicken: {
        name: "麦辣鸡腿堡",
        emoji: "🔥",
        desc: "你外表可能很随和，内心其实很有冲劲。你喜欢直接、刺激、有效率的生活，不太喜欢拖泥带水。你有热血的一面，越到关键时刻越能爆发。",
        traits: ["行动派", "有脾气也有魅力", "敢冲", "不服输"]
      },
      grilledChicken: {
        name: "原味板烧鸡腿堡",
        emoji: "🍗",
        desc: "你是舒服、稳定、耐看型人格。你不靠夸张取胜，而是靠长期相处后的踏实感。你有自己的节奏，不太喜欢过度内耗，更愿意把日子过得顺一点、稳一点。",
        traits: ["温和稳定", "耐看型", "靠谱", "生活感强"]
      },
      fries: {
        name: "薯条",
        emoji: "🍟",
        desc: "你是气氛组本人。你不一定总是主角，但你能让整个场子变得更好。你适应力强，和很多类型的人都能相处，也常常是朋友之间最容易被想起的人。",
        traits: ["百搭", "气氛组", "朋友缘好", "轻松自然"]
      },
      nuggets: {
        name: "麦乐鸡",
        emoji: "🧡",
        desc: "你看起来简单可爱，但其实很有自己的偏好。你重视安全感和熟悉感，喜欢小而确定的快乐。你不是时时刻刻都要赢，但你很懂怎么让自己开心。",
        traits: ["可爱但有主见", "治愈系", "安全感", "小快乐专家"]
      },
      filet: {
        name: "麦香鱼",
        emoji: "🐟",
        desc: "你是安静但特别的人。你不太需要在人群中抢风头，但你的存在有一种独特的辨识度。你敏感、细腻，有时慢热，但熟悉后会发现你很有自己的世界。",
        traits: ["慢热", "细腻", "特别", "低调有辨识度"]
      },
      mcflurry: {
        name: "奥利奥麦旋风",
        emoji: "🍦",
        desc: "你是甜酷混合型人格。你有可爱、轻松的一面，也有一点小叛逆和小戏剧感。你容易被新鲜感吸引，喜欢好玩、有氛围、有记忆点的东西。",
        traits: ["甜酷", "新鲜感", "有趣", "情绪感染力"]
      },
      muffin: {
        name: "猪柳蛋麦满分",
        emoji: "🌅",
        desc: "你是早起型责任感人格。你重视效率、秩序和实际成果，不喜欢虚头巴脑。你的可靠不是靠说出来的，而是靠一次次把事情做好体现出来的。",
        traits: ["责任感", "效率高", "务实", "能扛事"]
      },
      angus: {
        name: "安格斯厚牛堡",
        emoji: "🥩",
        desc: "你有一点高级感，也有一点野心。你不太满足于普通标准，喜欢更好的体验、更强的实力和更体面的结果。你可能偶尔挑剔，但那是因为你真的有要求。",
        traits: ["有野心", "高标准", "质感控", "目标感"]
      },
      corn: {
        name: "玉米杯",
        emoji: "🌽",
        desc: "你是清爽、真诚、低负担的人。你不喜欢复杂的人际套路，更喜欢简单舒服的关系。你的优点不是攻击性，而是让人觉得安心、干净、没有压力。",
        traits: ["清爽", "真诚", "低压力", "治愈"]
      }
    };

    const questions = [
      {
        text: "朋友约你出去玩，你通常更像哪种状态？",
        options: [
          { text: "我来定计划，路线、时间、吃什么都安排好", scores: { bigmac: 2, muffin: 1 } },
          { text: "看大家想去哪，我负责让气氛别冷", scores: { fries: 2, mcflurry: 1 } },
          { text: "只要舒服别太折腾，我都可以", scores: { grilledChicken: 2, corn: 1 } },
          { text: "最好有点刺激或新鲜，不然没意思", scores: { spicyChicken: 2, angus: 1 } }
        ]
      },
      {
        text: "你面对压力时更常见的反应是？",
        options: [
          { text: "先冷静拆解问题，一步一步处理", scores: { bigmac: 2, muffin: 2 } },
          { text: "直接硬上，越急越能逼出状态", scores: { spicyChicken: 2, angus: 1 } },
          { text: "先找个让自己安心的小事缓一下", scores: { nuggets: 2, corn: 1 } },
          { text: "会想很多，但也能从细节里找到突破口", scores: { filet: 2, grilledChicken: 1 } }
        ]
      },
      {
        text: "别人对你的第一印象最可能是？",
        options: [
          { text: "稳、有主见、像能管事的人", scores: { bigmac: 2, muffin: 1 } },
          { text: "热情、有冲劲、不太好惹但很真实", scores: { spicyChicken: 2 } },
          { text: "好相处、轻松、没有距离感", scores: { fries: 2, nuggets: 1 } },
          { text: "安静、有点神秘，需要慢慢了解", scores: { filet: 2, corn: 1 } }
        ]
      },
      {
        text: "你最喜欢哪种生活节奏？",
        options: [
          { text: "规律、高效、每天都有推进", scores: { muffin: 2, bigmac: 1 } },
          { text: "有计划，但不要太紧绷", scores: { grilledChicken: 2, corn: 1 } },
          { text: "随性一点，开心最重要", scores: { fries: 2, mcflurry: 1 } },
          { text: "要有目标感，最好能明显变强", scores: { angus: 2, spicyChicken: 1 } }
        ]
      },
      {
        text: "在一段关系里，你更看重什么？",
        options: [
          { text: "稳定、信任、长期陪伴", scores: { grilledChicken: 2, corn: 1 } },
          { text: "激情、吸引力、互相点燃", scores: { spicyChicken: 2, mcflurry: 1 } },
          { text: "舒服、好玩、能一起发疯", scores: { fries: 2, nuggets: 1 } },
          { text: "深度理解，能懂我的复杂和敏感", scores: { filet: 2, bigmac: 1 } }
        ]
      },
      {
        text: "如果你要做一个重要选择，你会？",
        options: [
          { text: "列利弊，算清楚风险收益", scores: { muffin: 2, bigmac: 1 } },
          { text: "看直觉，感觉对了就冲", scores: { spicyChicken: 2, mcflurry: 1 } },
          { text: "问几个信任的人，再选舒服的方向", scores: { grilledChicken: 2, fries: 1 } },
          { text: "标准很高，不想将就", scores: { angus: 2, filet: 1 } }
        ]
      },
      {
        text: "你更像哪一种快乐来源？",
        options: [
          { text: "完成目标后的成就感", scores: { angus: 2, muffin: 1 } },
          { text: "朋友一起玩、一起笑", scores: { fries: 2, mcflurry: 1 } },
          { text: "熟悉的小习惯、小确幸", scores: { nuggets: 2, grilledChicken: 1 } },
          { text: "独处、思考、沉浸在自己的世界", scores: { filet: 2, corn: 1 } }
        ]
      },
      {
        text: "你最讨厌别人怎么评价你？",
        options: [
          { text: "说我没能力、靠不住", scores: { bigmac: 2, muffin: 1 } },
          { text: "说我无聊、没个性", scores: { mcflurry: 2, spicyChicken: 1 } },
          { text: "说我太普通、没追求", scores: { angus: 2 } },
          { text: "说我麻烦、想太多", scores: { filet: 2, nuggets: 1 } }
        ]
      },
      {
        text: "你在人群中的角色更接近？",
        options: [
          { text: "组织者或决策者", scores: { bigmac: 2, muffin: 1 } },
          { text: "气氛调节者", scores: { fries: 2, mcflurry: 1 } },
          { text: "安静观察者", scores: { filet: 2, corn: 1 } },
          { text: "关键时刻站出来的人", scores: { spicyChicken: 2, angus: 1 } }
        ]
      },
      {
        text: "选一个最像你的关键词。",
        options: [
          { text: "稳", scores: { grilledChicken: 2, bigmac: 1 } },
          { text: "燃", scores: { spicyChicken: 2 } },
          { text: "甜", scores: { mcflurry: 2, nuggets: 1 } },
          { text: "清醒", scores: { corn: 2, filet: 1, muffin: 1 } }
        ]
      }
    ];

    let current = 0;
    let scores = Object.fromEntries(Object.keys(foods).map(k => [k, 0]));

    const questionText = document.getElementById('questionText');
    const optionsEl = document.getElementById('options');
    const qCount = document.getElementById('qCount');
    const progressBar = document.getElementById('progressBar');
    const quizPanel = document.getElementById('quizPanel');
    const resultPanel = document.getElementById('resultPanel');

    function renderQuestion() {
      const q = questions[current];
      questionText.textContent = q.text;
      qCount.textContent = `${current + 1} / ${questions.length}`;
      progressBar.style.width = `${(current / questions.length) * 100}%`;
      optionsEl.innerHTML = '';
      q.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = option.text;
        btn.onclick = () => choose(option.scores);
        optionsEl.appendChild(btn);
      });
    }

    function choose(optionScores) {
      for (const [food, value] of Object.entries(optionScores)) {
        scores[food] += value;
      }
      current++;
      if (current < questions.length) renderQuestion();
      else showResult();
    }

    function showResult() {
      progressBar.style.width = '100%';
      let winner = Object.keys(scores).sort((a, b) => scores[b] - scores[a])[0];
      const food = foods[winner];
      document.getElementById('foodEmoji').textContent = food.emoji;
      document.getElementById('foodName').textContent = food.name;
      document.getElementById('foodDesc').textContent = food.desc;
      const traitsEl = document.getElementById('traits');
      traitsEl.innerHTML = '';
      food.traits.forEach(t => {
        const div = document.createElement('div');
        div.className = 'trait';
        div.textContent = t;
        traitsEl.appendChild(div);
      });
      quizPanel.style.display = 'none';
      resultPanel.style.display = 'block';
    }

    function restartQuiz() {
      current = 0;
      scores = Object.fromEntries(Object.keys(foods).map(k => [k, 0]));
      quizPanel.style.display = 'block';
      resultPanel.style.display = 'none';
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function shareResult() {
      const text = `我的麦门人格测试结果是：${document.getElementById('foodName').textContent}！`;
      navigator.clipboard?.writeText(text).then(() => {
        alert('结果已复制，可以发给朋友了！');
      }).catch(() => {
        alert(text);
      });
    }

    function copyPageLink() {
      const link = window.location.href;
      navigator.clipboard?.writeText(link).then(() => {
        alert('网页链接已复制。上传到 GitHub Pages / Netlify / Vercel 后，这里复制的就是可分享网址。');
      }).catch(() => {
        alert(link);
      });
    }


    renderQuestion();
  </script>
</body>
</html>
